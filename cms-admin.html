<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOMT CMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Lora:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf8f5;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --accent: #c4a77d;
      --accent-dark: #a08c5f;
      --border: #e5e0d8;
      --error: #c0392b;
      --success: #27ae60;
    }
    html { font-size: 16px; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Login Screen */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3rem;
      width: 100%;
      max-width: 400px;
    }
    .login-box h1 {
      font-family: 'Lora', serif;
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
    }
    .login-box p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }
    .form-group { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }
    input[type="password"], input[type="text"], textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      background: var(--bg);
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea { resize: vertical; min-height: 100px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg); }
    .login-error {
      color: var(--error);
      font-size: 0.875rem;
      margin-top: 0.5rem;
      display: none;
    }
    .login-error.visible { display: block; }

    /* CMS Layout */
    .cms-layout { display: none; }
    .cms-layout.active { display: block; }
    .cms-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .cms-header h1 {
      font-family: 'Lora', serif;
      font-size: 1.125rem;
    }
    .cms-header .btn { font-size: 0.8rem; padding: 0.5rem 1rem; }
    .cms-main { max-width: 900px; margin: 0 auto; padding: 2rem; }

    /* Sections */
    .cms-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .cms-section-header {
      padding: 1rem 1.5rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .cms-section-header h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .cms-section-header .toggle {
      color: var(--text-muted);
      font-size: 0.75rem;
    }
    .cms-section-body { padding: 1.5rem; }
    .cms-section.collapsed .cms-section-body { display: none; }
    .cms-section.collapsed .toggle::before { content: '+'; }
    .cms-section:not(.collapsed) .toggle::before { content: '−'; }

    /* Form grid */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-group label { margin-bottom: 0.35rem; }
    .form-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    /* Status bar */
    .status-bar {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
    }
    .status-bar.visible { opacity: 1; transform: translateY(0); }
    .status-bar.success { background: var(--success); color: #fff; }
    .status-bar.error { background: var(--error); color: #fff; }
    .status-bar.saving { background: var(--accent); color: #fff; }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .cms-main { padding: 1rem; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>SOMT CMS</h1>
    <p>Content bearbeiten für drinksomt.ch</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="CMS Passwort" autocomplete="current-password" required>
        <div class="login-error" id="loginError">Falsches Passwort</div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Anmelden</button>

  </div>
</div>

          <div class="form-group">

          <div class="form-group full">
            <label>Produkt 2 — Beschreibung</label>
            <textarea id="product2_description" placeholder="Pfannengerösteter bancha-tee..."></textarea>
          </div>
          <div class="form-group">
            <label>Produkt 2 — Bild</label>
            <input type="text" id="product2_image" placeholder="img/hojicha_web_2.jpg">
          </div>
          <div class="form-group">
            <label>Produkt 2 — Bestellinfo</label>

          </div>
          <div class="form-group full">

          <div class="form-group">
            <label>Produkt 3 — Geschmack</label>
            <input type="text" id="product3_taste" placeholder="mineralisch-fruchtig">

          </div>
          <div class="form-group">

      <div class="cms-section-body">

          </div>

<!-- Status -->
<div class="status-bar" id="statusBar"></div>

<script>
const CMS_PASSWORD = 'somt-cms-2026';
const WEBHOOK_URL = 'https://drinksomt.ch/cms-webhook.php';

let statusTimeout;

// Statusanzeige
function showStatus(msg, type = 'saving') {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar visible ' + type;
  clearTimeout(statusTimeout);
  if (type !== 'saving') {
    statusTimeout = setTimeout(() => {
      bar.classList.remove('visible');
    }, 3500);
  }
}

// Login
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const pw = document.getElementById('password').value;
  if (pw === CMS_PASSWORD) {
    sessionStorage.setItem('cms_auth', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('cmsLayout').classList.add('active');
    loadFromServer();
  } else {
    document.getElementById('loginError').classList.add('visible');
  }
});

function logout() {
  sessionStorage.removeItem('cms_auth');
  location.reload();
}

// Check auth
if (sessionStorage.getItem('cms_auth') === '1') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('cmsLayout').classList.add('active');
}

// Section toggle
function toggleSection(el) {
  el.parentElement.classList.toggle('collapsed');
}

// Collect all form fields into a data object
function collectFields() {
  const data = {};
  document.querySelectorAll('input, textarea').forEach(el => {
    if (el.id) data[el.id] = el.value;
  });
  return data;
}

// Save
async function save() {
  const data = collectFields();
  showStatus('Speichere…', 'saving');
  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + CMS_PASSWORD
      },
      body: JSON.stringify(data)
    });
    const json = await res.json();
    if (json.success) {
      showStatus(json.bytes_written + ' bytes geschrieben ✓', 'success');
    } else {
      showStatus('Fehler: ' + JSON.stringify(json), 'error');
    }
  } catch(e) {
    showStatus('Netzwerkfehler: ' + e.message, 'error');
  }
}

// Load current index.html content from server and populate form
async function loadFromServer() {
  showStatus('Lade…', 'saving');
  try {
    // Fetch the live page and parse out content
    const res = await fetch('https://drinksomt.ch/index.html');
    const html = await res.text();

    // Simple parser: extract text between tags for known fields
    // This is a basic heuristic - for production a proper HTML parser would be better
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    const fields = {
      hero_title: getText(doc, 'h1', 0),
      hero_tagline: getText(doc, '.hero-text-2 h1', 0),
      hero_image: getAttr(doc, '.hero-content img', 'src', 0),
      hero_image_alt: getAttr(doc, '.hero-content img', 'alt', 0),

      product1_name: getText(doc, '#boutique .product:nth-child(1) h3', 0),
      product1_taste: getText(doc, '#boutique .product:nth-child(1) .taste', 0),
      product1_description: getText(doc, '#boutique .product:nth-child(1) .product-desc', 0),
      product1_image: getAttr(doc, '#boutique .product:nth-child(1) .product-image img', 'src', 0),
      product1_order: getText(doc, '#boutique .product:nth-child(1) .product-order', 0),
      product1_ingredients: getText(doc, '#boutique .product:nth-child(1) .product-details', 0),

      product2_name: getText(doc, '#boutique .product:nth-child(2) h3', 0),
      product2_taste: getText(doc, '#boutique .product:nth-child(2) .taste', 0),
      product2_description: getText(doc, '#boutique .product:nth-child(2) .product-desc', 0),
      product2_image: getAttr(doc, '#boutique .product:nth-child(2) .product-image img', 'src', 0),
      product2_order: getText(doc, '#boutique .product:nth-child(2) .product-order', 0),
      product2_ingredients: getText(doc, '#boutique .product:nth-child(2) .product-details', 0),

      product3_name: getText(doc, '#boutique .product:nth-child(3) h3', 0),
      product3_taste: getText(doc, '#boutique .product:nth-child(3) .taste', 0),
      product3_description: getText(doc, '#boutique .product:nth-child(3) .product-desc', 0),
      product3_image: getAttr(doc, '#boutique .product:nth-child(3) .product-image img', 'src', 0),
      product3_order: getText(doc, '#boutique .product:nth-child(3) .product-order', 0),
      product3_ingredients: getText(doc, '#boutique .product:nth-child(3) .product-details', 0),

      pairing_title_large: getText(doc, '.pairing-title-large', 0),
      pairing_subtitle: getText(doc, '.pairing-subtitle', 0),
      pairing_image: getAttr(doc, '.pairing-content > img', 'src', 0),
      pairing_image_alt: getAttr(doc, '.pairing-content > img', 'alt', 0),
      pairing_p1: getText(doc, '.pairing-text p:nth-child(1)', 0),
      pairing_p2: getText(doc, '.pairing-text p:nth-child(2)', 0),
      pairing_p3: getText(doc, '.pairing-text p:nth-child(3)', 0),

      about_image: getAttr(doc, '.about-img', 'src', 0),
      about_title: getText(doc, '.about h1', 0),
      about_p1: getText(doc, '#about-p1', 0) || getText(doc, '.about-text p:nth-child(2)', 0),
      about_p2: getText(doc, '#about-p2', 0) || getText(doc, '.about-text p:nth-child(3)', 0),
      about_p3: getText(doc, '#about-p3', 0) || getText(doc, '.about-text p:nth-child(4)', 0),

      title: getMeta(doc, 'og:title') || 'somt tee',
      meta_description: getMeta(doc, 'description') || '',
      og_title: getMeta(doc, 'og:title') || '',
      og_description: getMeta(doc, 'og:description') || '',
      og_image: getMeta(doc, 'og:image') || '',
      og_url: getMeta(doc, 'og:url') || '',
      canonical_url: doc.querySelector('link[rel="canonical"]')?.href || '',
      copyright_year: getText(doc, '.footer i', 0)?.replace(/[^0-9]/g, '') || '2026'
    };

    // Clean up HTML from field values (e.g. <br> → \n, strip tags from text)
    Object.keys(fields).forEach(k => {
      if (fields[k]) {
        fields[k] = fields[k].replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '').trim();
      }
    });

    // Populate form
    Object.keys(fields).forEach(k => {
      const el = document.getElementById(k);
      if (el) el.value = fields[k] || '';
    });

    showStatus('Geladen ✓', 'success');
  } catch(e) {
    showStatus('Ladefehler: ' + e.message, 'error');
  }
}

// Helpers
function getText(doc, selector, idx) {
  const els = doc.querySelectorAll(selector);
  return els[idx]?.textContent?.trim() || '';
}
function getAttr(doc, selector, attr, idx) {
  return doc.querySelectorAll(selector)[idx]?.getAttribute(attr) || '';
}
function getMeta(doc, name) {
  return doc.querySelector(`meta[property="${name}"]`)?.content ||
         doc.querySelector(`meta[name="${name}"]`)?.content || '';
}
</script>
